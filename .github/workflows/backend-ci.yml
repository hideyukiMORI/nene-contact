name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # pdo_sqlite: PHPUnit runs on SQLite (.env.example DB_ADAPTER=sqlite).
          # sodium: Notification/SodiumConfigCipher. gd: Media/MediaImageProcessor.
          extensions: pdo, pdo_sqlite, sodium, gd, mbstring, fileinfo
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # NENE2 is a local path dependency (composer.json repositories: ../NENE2,
      # hideyukimori/nene2 @dev), so the sibling checkout must exist before
      # composer install. Same form as nene-records.
      - name: Clone NENE2 (local path dependency)
        run: git clone --depth=1 https://github.com/hideyukiMORI/NENE2.git ../NENE2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: cp .env.example .env

      - name: Create var directory
        run: mkdir -p var

      # composer check = test (PHPUnit, SQLite) + analyse (PHPStan) + cs
      # (php-cs-fixer dry-run) + openapi + mcp + no-physical-delete +
      # usecases-audited + conformance (NENE2 conformance linter, runs from
      # the consumer's vendor/ against conformance.baseline.json).
      - name: Run checks
        run: composer check
