name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm run check = type-check + lint + format + test (vitest) + knip
      # + build-storybook.
      - name: Check (type-check, lint, format, test, knip, storybook)
        run: npm run check

      # Production build is not part of `npm run check` here (unlike field),
      # so run it explicitly to keep the same gate coverage.
      - name: Build (production)
        run: npm run build

      # Embed widget artifact (public_html/embed.js → public_html/embed/),
      # includes the CSP guard in scripts/build-embed.mjs.
      - name: Build embed widget
        run: npm run build:embed

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
