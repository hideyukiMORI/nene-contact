openapi: 3.1.0
info:
  title: NeNe Contact API
  version: 0.1.0
  description: >
    Embeddable contact forms, submission inbox, and notifications on NENE2.
    Admin routes require a bearer JWT and are organization-scoped (ADR 0006/0014).
    Public embed routes resolve the organization via public_form_key (ADR 0010).
    Errors use RFC 9457 Problem Details (https://nene-contact.dev/problems/).
servers:
  - url: http://127.0.0.1:8900
    description: Local development

tags:
  - name: System
  - name: Auth
  - name: User
  - name: Organization
  - name: ContactForm
  - name: NotificationChannel
  - name: Submission
  - name: Audit
  - name: Attachment
  - name: Handoff
  - name: Records
  - name: Agent
  - name: Public

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /admin/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate and receive a bearer JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/users:
    get:
      tags: [User]
      operationId: listUsers
      summary: List users in the organization
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      tags: [User]
      operationId: createUser
      summary: Create a user in the organization
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/users/{id}:
    get:
      tags: [User]
      operationId: getUserById
      summary: Get a user by id
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: User
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    patch:
      tags: [User]
      operationId: updateUser
      summary: Update a user's role and/or status
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/organizations:
    get:
      tags: [Organization]
      operationId: listOrganizations
      summary: List organizations (superadmin)
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      tags: [Organization]
      operationId: createOrganization
      summary: Create an organization (superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrganizationRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/organizations/{id}:
    get:
      tags: [Organization]
      operationId: getOrganizationById
      summary: Get an organization by id (superadmin)
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/contact-forms:
    get:
      tags: [ContactForm]
      operationId: listContactForms
      summary: List contact forms in the organization
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: Contact form list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactFormListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
    post:
      tags: [ContactForm]
      operationId: createContactForm
      summary: Create a contact form
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateContactFormRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactFormResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/contact-forms/{id}:
    get:
      tags: [ContactForm]
      operationId: getContactFormById
      summary: Get a contact form by id
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Contact form
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactFormResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    put:
      tags: [ContactForm]
      operationId: updateContactForm
      summary: Update a contact form
      description: >-
        Replaces the editable fields (name, locales, consent, retention, allowed origins,
        and the field set) of an existing form. The public form key is immutable, so existing
        embeds keep working. Audited as contact_form.updated (ADR 0013).
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateContactFormRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContactFormResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
    delete:
      tags: [ContactForm]
      operationId: deleteContactForm
      summary: Delete a contact form (soft delete)
      description: >-
        Soft-deletes the form (ADR 0016 — no physical row deletion): it drops out of every
        read immediately, while received submissions are retained. Audited as
        contact_form.deleted (ADR 0013).
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/notification-channels:
    get:
      tags: [NotificationChannel]
      operationId: listNotificationChannels
      summary: List notification channels for a form
      parameters:
        - name: contact_form_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Channel list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationChannelListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
    post:
      tags: [NotificationChannel]
      operationId: createNotificationChannel
      summary: Create a notification channel for a form
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateNotificationChannelRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationChannelResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/audit-events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      summary: List the organization's audit trail
      description: >-
        Append-only record of every mutation (ADR 0013): who (actor_user_id), what
        (action / entity_type / entity_id) and the sanitized before/after snapshots.
        Scoped to the resolved organization; requires the ViewAuditLog capability
        (admin / superadmin). Ordered newest first.
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - name: q
          in: query
          required: false
          description: Free-text match over action / entity type / "entity_type #id".
          schema: { type: string }
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on created_at (YYYY-MM-DD).
          schema: { type: string, format: date }
        - name: to
          in: query
          required: false
          description: Inclusive upper bound on created_at (YYYY-MM-DD).
          schema: { type: string, format: date }
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEventListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }

  /admin/submissions:
    get:
      tags: [Submission]
      operationId: listSubmissions
      summary: List submissions in the organization
      description: >-
        Inbox list. Field values are **masked** (charter §11) — the bulk list never discloses
        raw PII; full content is on the single submission detail. Filtering/search run
        server-side so raw values are never shipped in bulk to the client.
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [open, in_progress, resolved, spam] }
        - name: contact_form_id
          in: query
          required: false
          schema: { type: integer }
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on submitted_at (YYYY-MM-DD).
          schema: { type: string, format: date }
        - name: to
          in: query
          required: false
          description: Inclusive upper bound on submitted_at (YYYY-MM-DD).
          schema: { type: string, format: date }
        - name: q
          in: query
          required: false
          description: Free-text match over submitted content (matched server-side; raw values are not returned).
          schema: { type: string }
        - name: sort
          in: query
          required: false
          description: Row order. Defaults to newest first.
          schema: { type: string, enum: [date_desc, date_asc, status, form] }
      responses:
        '200':
          description: Submission list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }

  /admin/submissions/export:
    get:
      tags: [Submission]
      operationId: exportSubmissions
      summary: Export submissions as CSV
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}:
    get:
      tags: [Submission]
      operationId: getSubmissionById
      summary: Get a submission by id
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Submission
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    patch:
      tags: [Submission]
      operationId: updateSubmissionStatus
      summary: Update a submission's status
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSubmissionStatusRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
    delete:
      tags: [Submission]
      operationId: deleteSubmission
      summary: Soft-delete a submission (data-subject deletion right)
      description: >
        Soft-deletes the submission (charter §4): it is hidden from the inbox immediately
        and hard-deleted by the purge job after a grace period (§5). Audited.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '204':
          description: Soft-deleted
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/technical-meta:
    get:
      tags: [Submission]
      operationId: getSubmissionTechnicalMeta
      summary: Disclose a submission's technical reception metadata (IP / User-Agent)
      description: >
        Discloses the submission's IP and User-Agent for abuse investigation (ADR 0018).
        These are excluded from every default payload (charter §2/§11); this endpoint is the
        only disclosure path and **records an audit event** (`submission_technical_meta.viewed`)
        before returning. Gated by the `ViewSubmissionTechnicalMeta` capability (admin +
        superadmin). Not exposed via MCP.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Technical reception metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionTechnicalMetaResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/field-values:
    patch:
      tags: [Submission]
      operationId: correctSubmission
      summary: Correct a submission's stored field values (data-subject correction right)
      description: >
        Merge-corrects the provided field values (charter §4). Only fields declared on the
        form may be corrected (purpose limitation). The change is audited as
        `submission.corrected` with the changed field names — never raw values.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CorrectSubmissionRequest' }
      responses:
        '200':
          description: Corrected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/submissions/{id}/notes:
    get:
      tags: [Submission]
      operationId: listSubmissionNotes
      summary: List notes on a submission
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Note list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionNoteListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    post:
      tags: [Submission]
      operationId: addSubmissionNote
      summary: Add an operator note to a submission
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddSubmissionNoteRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionNoteResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /admin/submissions/{id}/attachments:
    get:
      tags: [Attachment]
      operationId: listSubmissionAttachments
      summary: List a submission's attachments (metadata)
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Attachment list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/attachments/{attachmentId}:
    get:
      tags: [Attachment]
      operationId: downloadAttachment
      summary: Download an attachment's bytes (audited PII access)
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
        - name: attachmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Attachment bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/handoffs:
    get:
      tags: [Handoff]
      operationId: listSubmissionHandoffs
      summary: List a submission's sibling handoff links (status + pointers)
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Handoff link list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionLinkListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/handoffs/deal:
    post:
      tags: [Handoff]
      operationId: handoffSubmissionToDeal
      summary: Hand a submission to NeNe Deal (create opportunity); same call retries
      description: >
        Creates an opportunity in NeNe Deal over HTTP (DO D11), idempotent via
        external_reference = submission_id. Always returns 200 with the resulting link;
        `handoff_status` is `succeeded` (with `deal_opportunity_id`) or `failed` (with
        `last_error`, submission untouched). Re-POST to retry. Audited (handoff.created /
        handoff.retried). Requires the ManageSubmissions capability.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Handoff attempt recorded (see handoff_status for the outcome)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionLinkResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/handoffs/invoice:
    post:
      tags: [Handoff]
      operationId: handoffSubmissionToInvoice
      summary: Hand a submission to NeNe Invoice (create draft client); same call retries
      description: >
        Creates a draft client in NeNe Invoice over HTTP (invoice-handoff-contract), idempotent
        via external_reference = submission_id. Always returns 200 with the resulting link;
        `handoff_status` is `succeeded` (with `invoice_client_id`) or `failed` (with `last_error`,
        submission untouched). Re-POST to retry. Audited (handoff.created / handoff.retried).
        Requires the ManageSubmissions capability.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      responses:
        '200':
          description: Handoff attempt recorded (see handoff_status for the outcome)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionLinkResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /admin/submissions/{id}/handoffs/vault/{attachmentId}:
    post:
      tags: [Handoff]
      operationId: handoffAttachmentToVault
      summary: Archive a submission attachment in NeNe Vault; same call retries
      description: >
        Uploads the attachment bytes to NeNe Vault as a received document over HTTP (DO D12),
        idempotent per attachment. Always returns 200 with the resulting link; `handoff_status`
        is `succeeded` (with `vault_document_id`) or `failed` (with `last_error`, attachment
        untouched). Re-POST to retry. Audited (handoff.created / handoff.retried). Requires the
        ManageSubmissions capability.
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
        - name: attachmentId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Handoff attempt recorded (see handoff_status for the outcome)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmissionLinkResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /public/forms/{public_form_key}/attachments:
    post:
      tags: [Attachment]
      operationId: uploadAttachment
      summary: Upload a file attachment for a form (embed widget)
      description: >
        Multipart upload (field `file`) for the form's file field (D12). Enforces size cap +
        content-type allowlist + virus-scan hook. Returns an attachment_id to include as
        `attachment_ids` on the subsequent submit.
      security: []
      parameters:
        - { $ref: '#/components/parameters/PublicFormKeyPath' }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        '201':
          description: Stored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentUploadResponse' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
        '429': { $ref: '#/components/responses/Problem' }

  /admin/records/options:
    get:
      tags: [Records]
      operationId: fetchRecordsOptions
      summary: Fetch select options from a NeNe Records entity (read-only)
      description: >
        Reads a Records entity's select options over HTTP (ADR 0002 — Records is the SSOT; no
        shared DB) for the form builder to import into a select field. Requires the ManageForms
        capability. Upstream failures surface as problem details.
      parameters:
        - name: source
          in: query
          required: true
          description: The Records entity key.
          schema: { type: string }
      responses:
        '200':
          description: Options
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordsOptionsResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
        '502': { $ref: '#/components/responses/Problem' }

  /api/forms:
    get:
      tags: [Agent]
      operationId: agentListForms
      summary: List contact forms for AI agents (metadata only)
      description: >
        Agent read surface (the OpenAPI MCP maps to; ADR 0002 — Contact only, no sibling DB).
        Returns form structure (fields, locales) only — no secrets, no submitted PII.
      security:
        - machineApiKey: []
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: Form list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentFormListResponse' }
        '401': { $ref: '#/components/responses/Problem' }

  /api/submissions:
    get:
      tags: [Agent]
      operationId: agentListSubmissions
      summary: List submissions for AI agents (redacted by default)
      description: >
        Redacted by default — no IP/user-agent, field values masked (charter §11). `include_pii=true`
        returns raw values and is audit-logged as a bulk PII access (`submission.exported`).
      security:
        - machineApiKey: []
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { $ref: '#/components/parameters/IncludePii' }
      responses:
        '200':
          description: Submission list (redacted unless include_pii=true)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSubmissionListResponse' }
        '401': { $ref: '#/components/responses/Problem' }
    post:
      tags: [Agent]
      operationId: agentIngestSubmission
      summary: Ingest a submission from a service client (e.g. Concierge) into the inbox
      description: >
        Creates a submission from a service client (concierge-ingest-contract). `contact_form_id`
        must belong to the resolved organization. Field values are validated against the form
        (required, email, consent) like the public submit; audited (`submission.created`) and
        notified. No autonomous outbound action on personal data (charter §11).
      security:
        - machineApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngestSubmissionRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IngestSubmissionResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }

  /api/submissions/{id}:
    get:
      tags: [Agent]
      operationId: agentGetSubmission
      summary: Get one submission for AI agents (redacted by default)
      description: >
        Redacted by default. `include_pii=true` returns raw values and is audit-logged
        (`submission.viewed`, charter §11).
      security:
        - machineApiKey: []
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
        - { $ref: '#/components/parameters/IncludePii' }
      responses:
        '200':
          description: Submission (redacted unless include_pii=true)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentSubmissionResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    patch:
      tags: [Agent]
      operationId: agentUpdateSubmissionStatus
      summary: Update submission status (two-step confirmation token, agent write)
      description: >
        Agent write behind a confirmation token (charter §11 — no autonomous outbound action).
        Call without `confirmation_token` to get a preview + token (nothing changes); call again
        with the token to apply (audited). The token binds to this submission id + status.
      security:
        - machineApiKey: []
      parameters:
        - { $ref: '#/components/parameters/IdPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentStatusUpdateRequest' }
      responses:
        '200':
          description: Either a confirmation challenge (no change) or the applied result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentStatusUpdateResult' }
        '401': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
        '503': { $ref: '#/components/responses/Problem' }

  /public/forms/{public_form_key}/schema:
    get:
      tags: [Public]
      operationId: getPublicFormSchema
      summary: Public form schema for the embed widget
      security: []
      parameters:
        - { $ref: '#/components/parameters/PublicFormKeyPath' }
      responses:
        '200':
          description: Form schema
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicFormSchema' }
        '404': { $ref: '#/components/responses/Problem' }

  /public/forms/{public_form_key}/submissions:
    post:
      tags: [Public]
      operationId: submitPublicForm
      summary: Submit a contact form (embed widget)
      security: []
      parameters:
        - { $ref: '#/components/parameters/PublicFormKeyPath' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: >
                Field name/value pairs matching the form schema. When the form has
                consent_required, include `consent: true` (affirmative) or the submit is
                rejected (422); the consent checkbox is never pre-checked (charter §3).
              properties:
                consent: { type: boolean }
                attachment_ids: { type: array, items: { type: integer }, description: 'Ids returned by the attachment upload endpoint (D12).' }
      responses:
        '201':
          description: Stored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubmitAccepted' }
        '204':
          description: Accepted silently (honeypot tripped)
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/ValidationProblem' }
        '429': { $ref: '#/components/responses/Problem' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    machineApiKey:
      type: apiKey
      in: header
      name: X-NENE2-API-Key
      description: >
        Machine API key (NENE2 `ApiKeyAuthenticationMiddleware`, env `NENE2_MACHINE_API_KEY`).
        Gates the agent read surface `/api/*` that MCP tools map to (ADR 0002).

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    PublicFormKeyPath:
      name: public_form_key
      in: path
      required: true
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
    IncludePii:
      name: include_pii
      in: query
      required: false
      description: When true, returns raw (unmasked) field values; audit-logged (charter §11).
      schema: { type: boolean, default: false }

  responses:
    Problem:
      description: RFC 9457 Problem Details
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    ValidationProblem:
      description: Validation failed
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ValidationProblemDetails' }

  schemas:
    Health:
      type: object
      properties:
        status: { type: string, examples: [ok] }
        service: { type: string }
      required: [status]

    ProblemDetails:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
      required: [type, title, status]

    ValidationError:
      type: object
      properties:
        field: { type: string }
        message: { type: string }
        code: { type: string }
      required: [field, message, code]

    ValidationProblemDetails:
      allOf:
        - { $ref: '#/components/schemas/ProblemDetails' }
        - type: object
          properties:
            errors:
              type: array
              items: { $ref: '#/components/schemas/ValidationError' }

    LocaleMap:
      type: object
      additionalProperties: { type: string }
      description: Per-locale strings keyed by ja / en only (ADR 0011).

    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
        email: { type: string }
        role: { type: string, enum: [superadmin, admin, editor] }
        org_id: { type: [integer, 'null'] }
      required: [token, role]

    UserResponse:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        role: { type: string, enum: [superadmin, admin, editor] }
        organization_id: { type: [integer, 'null'] }
        status: { type: string, enum: [active, disabled] }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }
      required: [id, email, role, status]

    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/UserResponse' }

    CreateUserRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [admin, editor] }
      required: [email, password, role]

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        role: { type: string, enum: [admin, editor] }
        status: { type: string, enum: [active, disabled] }

    OrganizationResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        external_id: { type: [string, 'null'] }
        custom_domain: { type: [string, 'null'] }
        plan: { type: string }
        is_active: { type: boolean }
      required: [id, name, slug]

    OrganizationListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OrganizationResponse' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }

    CreateOrganizationRequest:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        plan: { type: string, enum: [free, starter, pro, enterprise] }
        external_id: { type: string }
        custom_domain: { type: string }
      required: [name, slug]

    FormField:
      type: object
      properties:
        id: { type: integer }
        field_type:
          type: string
          enum: [text, email, phone, textarea, select, checkbox, date, file, honeypot]
          description: >
            Closed allowlist (single source of truth: NeneContact\ContactForm\FieldType).
            My Number and raw payment card numbers are prohibited as any field type and
            要配慮個人情報 is never a default (APPI charter §8, Definition of Done A4).
        name: { type: string }
        label: { $ref: '#/components/schemas/LocaleMap' }
        placeholder: { type: [string, 'null'], description: 'Optional input hint text shown in the embed.' }
        description: { type: [string, 'null'], description: 'Optional per-field description shown under the label in the embed.' }
        required: { type: boolean }
        options: { type: [array, 'null'], items: { $ref: '#/components/schemas/ChoiceOption' } }
        config:
          type: [object, 'null']
          additionalProperties: true
          description: >
            Declarative per-field config (server-normalized). For select fields it is the choice
            display config ({@see ChoiceFieldConfig}: style/defaults/other/count_rule/image); for
            text/email/phone/textarea/date/file it is the type-specific config (FieldTypeConfig).
            Null for checkbox/honeypot.
        sort_order: { type: integer }
      required: [field_type, name, label]

    ChoiceOption:
      type: object
      description: A single choice option. `value` is the stable id that config.defaults reference.
      properties:
        value: { type: string }
        label: { $ref: '#/components/schemas/LocaleMap' }
        description: { allOf: [{ $ref: '#/components/schemas/LocaleMap' }], description: 'Optional per-option supplementary note (picture choice / list).' }
        image: { type: boolean, description: 'Whether this option has an attached image (picture choice).' }
      required: [value]

    ChoiceFieldConfig:
      type: object
      description: >
        Display config for a choice (select) field (choice-field management UI, builder spec
        v2.0). The style internalizes the selection logic (radio/dropdown/segment = single;
        checkbox/tags/chips = multiple). Declarative only — no operator JavaScript (ADR 0010).
      properties:
        style: { type: string, enum: [radio, dropdown, segment, checkbox, tags, chips] }
        defaults: { type: array, items: { type: string }, description: 'Initially-selected option values; single-logic styles keep at most one.' }
        other: { type: boolean, description: 'Whether an 「その他」 free-text choice is offered.' }
        other_config:
          type: object
          properties:
            label: { type: string }
            placeholder: { type: string }
            required: { type: boolean }
            max_len: { type: integer, minimum: 0, maximum: 2000, description: '0 = unlimited.' }
        count_rule:
          type: object
          description: Selection-count rule; only applies to multiple-logic styles.
          properties:
            min_on: { type: boolean }
            min: { type: integer, minimum: 1 }
            max_on: { type: boolean }
            max: { type: integer, minimum: 1 }
        image:
          type: object
          description: Picture choice; only the list styles (radio/checkbox) can enable it.
          properties:
            enabled: { type: boolean }
            layout: { type: string, enum: [card, list] }
            cols: { type: integer, enum: [2, 3] }
            ratio: { type: string, enum: ['1:1', '4:3', '16:9'] }
      required: [style]

    ContactFormResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: [string, 'null'], description: 'Optional form description shown above the fields in the embed.' }
        public_form_key: { type: string }
        default_locale: { type: string, enum: [ja, en] }
        locales: { type: array, items: { type: string, enum: [ja, en] } }
        allowed_origins: { type: array, items: { type: string } }
        status: { type: string }
        consent_required: { type: boolean }
        consent_label: { oneOf: [{ $ref: '#/components/schemas/LocaleMap' }, { type: 'null' }] }
        retention_days: { type: [integer, 'null'], description: 'Per-form retention; null uses the documented default (charter §5).' }
        fields:
          type: array
          items: { $ref: '#/components/schemas/FormField' }
      required: [id, name, public_form_key, default_locale, locales, fields]

    ContactFormListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ContactFormResponse' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }

    CreateContactFormRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, description: 'Optional form description shown above the fields in the embed.' }
        public_form_key: { type: string, description: 'Optional custom public slug (lowercase a-z0-9 and hyphens, 2-64, globally unique). Omit to auto-generate. Immutable after creation.' }
        default_locale: { type: string, enum: [ja, en] }
        locales: { type: array, items: { type: string, enum: [ja, en] } }
        allowed_origins: { type: array, items: { type: string } }
        consent_required: { type: boolean, default: false }
        consent_label:
          allOf: [{ $ref: '#/components/schemas/LocaleMap' }]
          description: Per-locale consent copy (ja/en); required for the default locale when consent_required is true (charter §3).
        retention_days: { type: integer, minimum: 1, description: 'Optional per-form retention in days; omit to use the documented default (charter §5).' }
        fields:
          type: array
          items:
            type: object
            properties:
              field_type: { type: string, enum: [text, email, phone, textarea, select, checkbox, date, file, honeypot] }
              name: { type: string }
              label: { $ref: '#/components/schemas/LocaleMap' }
              placeholder: { type: string, description: 'Optional input hint text shown in the embed.' }
              description: { type: string, description: 'Optional per-field description shown under the label.' }
              required: { type: boolean }
              options: { type: array, items: { $ref: '#/components/schemas/ChoiceOption' } }
              config: { type: object, additionalProperties: true, description: 'Per-field declarative config (choice display config for select, or the type-specific config otherwise).' }
            required: [field_type, name, label]
      required: [name, default_locale, locales, fields]

    PublicFormSchema:
      type: object
      properties:
        public_form_key: { type: string }
        name: { type: string }
        description: { type: [string, 'null'], description: 'Optional form description shown above the fields in the embed.' }
        default_locale: { type: string, enum: [ja, en] }
        locales: { type: array, items: { type: string, enum: [ja, en] } }
        consent_required: { type: boolean }
        consent_label: { oneOf: [{ $ref: '#/components/schemas/LocaleMap' }, { type: 'null' }] }
        fields:
          type: array
          items: { $ref: '#/components/schemas/FormField' }
      required: [public_form_key, name, default_locale, locales, fields, consent_required]

    SubmitAccepted:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
      required: [id, status]

    SubmissionResponse:
      type: object
      properties:
        id: { type: integer }
        contact_form_id: { type: integer }
        status: { type: string, enum: [open, in_progress, resolved, spam] }
        source: { type: string, description: "origin: form (public/embed) or service (concierge/import/api)" }
        source_url: { type: [string, 'null'], description: "embed host page the form was submitted from (referer); safe reception meta (ADR 0018)" }
        locale: { type: [string, 'null'], description: "locale the visitor submitted in (one of the form's locales); safe reception meta" }
        field_values: { type: object, additionalProperties: true }
        consent_label: { oneOf: [{ $ref: '#/components/schemas/LocaleMap' }, { type: 'null' }] }
        consent_given_at: { type: [string, 'null'], format: date-time }
        submitted_at: { type: [string, 'null'] }
      required: [id, contact_form_id, status]

    SubmissionTechnicalMetaResponse:
      type: object
      description: >
        Technical reception metadata disclosed only by the audited disclosure endpoint
        (ADR 0018); never present in any default payload (charter §2/§11).
      properties:
        id: { type: integer }
        ip: { type: [string, 'null'], description: "request IP (abuse investigation only)" }
        user_agent: { type: [string, 'null'], description: "request User-Agent (abuse investigation only)" }
      required: [id]

    RecordsOptionsResponse:
      type: object
      properties:
        source: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
            required: [value, label]

    AgentFormResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        public_form_key: { type: string }
        default_locale: { type: string }
        locales: { type: array, items: { type: string } }
        status: { type: string }
        consent_required: { type: boolean }
        retention_days: { type: [integer, 'null'] }
        fields:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              field_type: { type: string }
              required: { type: boolean }
              label: { type: object, additionalProperties: { type: string } }
      required: [id, name, public_form_key]

    AgentFormListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AgentFormResponse' }

    AgentSubmissionResponse:
      type: object
      properties:
        id: { type: integer }
        contact_form_id: { type: integer }
        status: { type: string }
        source: { type: string }
        pii_included: { type: boolean }
        field_values: { type: object, additionalProperties: true, description: masked unless pii_included }
        consent_given_at: { type: [string, 'null'], format: date-time }
        submitted_at: { type: [string, 'null'] }
      required: [id, contact_form_id, status, pii_included]

    AgentSubmissionListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AgentSubmissionResponse' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
        pii_included: { type: boolean }

    IngestSubmissionRequest:
      type: object
      properties:
        source: { type: string, enum: [concierge, import, api] }
        contact_form_id: { type: integer }
        field_values: { type: object, additionalProperties: true }
        consent: { type: boolean, description: required when the form requires consent }
      required: [source, contact_form_id, field_values]

    IngestSubmissionResponse:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        source: { type: string }
      required: [id, status, source]

    AgentStatusUpdateRequest:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, resolved, spam] }
        confirmation_token: { type: string, description: omit to get a token + preview; pass back to apply }
      required: [status]

    AgentStatusUpdateResult:
      type: object
      description: A confirmation challenge (requires_confirmation=true, no change) or the applied result.
      properties:
        requires_confirmation: { type: boolean }
        action: { type: string }
        confirmation_token: { type: string }
        expires_at: { type: [string, 'null'], format: date-time }
        preview:
          type: object
          properties:
            submission_id: { type: integer }
            current_status: { type: string }
            requested_status: { type: string }
        confirmed: { type: boolean }
        submission: { $ref: '#/components/schemas/AgentSubmissionResponse' }
      required: [requires_confirmation]

    SubmissionLinkResponse:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: integer }
        attachment_id: { type: [integer, 'null'] }
        target: { type: string, enum: [deal, vault, invoice] }
        handoff_status: { type: string, enum: [pending, succeeded, failed] }
        deal_opportunity_id: { type: [string, 'null'] }
        vault_document_id: { type: [string, 'null'] }
        invoice_client_id: { type: [string, 'null'] }
        last_error: { type: [string, 'null'] }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }
      required: [id, submission_id, target, handoff_status]

    SubmissionLinkListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SubmissionLinkResponse' }

    AttachmentResponse:
      type: object
      properties:
        id: { type: integer }
        field_name: { type: string }
        original_filename: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer }
        scan_status: { type: string, enum: [skipped, clean, infected] }
        created_at: { type: [string, 'null'], format: date-time }
      required: [id, field_name, original_filename, content_type, size_bytes, scan_status]

    AttachmentListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AttachmentResponse' }

    AttachmentUploadResponse:
      type: object
      properties:
        attachment_id: { type: integer }
        field_name: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer }
      required: [attachment_id]

    SubmissionListResponse:
      type: object
      properties:
        items:
          type: array
          description: Submissions with masked field values (charter §11).
          items: { $ref: '#/components/schemas/SubmissionResponse' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }
        status_counts:
          type: object
          description: Per-status totals for the current query/form/date filter (status filter ignored).
          additionalProperties: { type: integer }

    AuditEventResponse:
      type: object
      properties:
        id: { type: integer }
        actor_user_id: { type: integer, nullable: true, description: User who performed the change; null for system/CLI actions. }
        organization_id: { type: integer, nullable: true }
        action: { type: string, description: 'e.g. submission.status_updated, contact_form.updated, organization.created' }
        entity_type: { type: string }
        entity_id: { type: integer, nullable: true }
        before:
          type: object
          nullable: true
          additionalProperties: true
          description: Sanitized snapshot before the change (null for creates).
        after:
          type: object
          nullable: true
          additionalProperties: true
          description: Sanitized snapshot after the change (null for deletes).
        created_at: { type: string, nullable: true }

    AuditEventListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditEventResponse' }
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }

    UpdateSubmissionStatusRequest:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, resolved, spam] }
      required: [status]

    CorrectSubmissionRequest:
      type: object
      properties:
        field_values:
          type: object
          minProperties: 1
          additionalProperties: true
          description: Field name/value pairs to correct; keys must be fields declared on the form.
      required: [field_values]

    SubmissionNoteResponse:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: integer }
        author_user_id: { type: [integer, 'null'] }
        body: { type: string }
        created_at: { type: [string, 'null'] }
      required: [id, submission_id, body]

    SubmissionNoteListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SubmissionNoteResponse' }

    AddSubmissionNoteRequest:
      type: object
      properties:
        body: { type: string }
      required: [body]

    NotificationChannelResponse:
      type: object
      properties:
        id: { type: integer }
        contact_form_id: { type: integer }
        channel_type: { type: string, enum: [email, slack, chatwork, webhook] }
        is_enabled: { type: boolean }
      required: [id, contact_form_id, channel_type]

    NotificationChannelListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/NotificationChannelResponse' }

    CreateNotificationChannelRequest:
      type: object
      properties:
        contact_form_id: { type: integer }
        channel_type: { type: string, enum: [email, slack, chatwork, webhook] }
        config:
          type: object
          additionalProperties: true
          description: >
            Channel-specific keys (encrypted at rest). email: recipient; slack: webhook_url;
            chatwork: api_token, room_id; webhook: url, secret (HMAC-SHA256 signing).
        is_enabled: { type: boolean }
      required: [contact_form_id, channel_type, config]
